appId: com.hex2bkap.kotobagae
productName: Kotobagae
copyright: Copyright © 2026 hex2bkap

publish: null

asar: true

directories:
  output: dist

files:
  - out/**/*
  - '!**/*.map'

icon: build/icon.ico

fileAssociations:
  - ext: txt
    name: テキストファイル
    role: Editor

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

artifactName: Kotobagae-${version}-${arch}-portable.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: Kotobagae-Setup-${version}-${arch}.${ext}
  shortcutName: コトバガエ

mac:
  icon: build/icon.png
  artifactName: Kotobagae-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.productivity
  minimumSystemVersion: '11.0'
  identity: null
